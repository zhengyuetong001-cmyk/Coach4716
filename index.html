<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>训练记录系统</title>
<style>
body {
  font-family: Arial, "Microsoft YaHei", sans-serif;
  background: #f1f5f9;
  padding: 10px;
  max-width: 460px;
  margin: auto;
}
h2 { margin: 10px 0; }
.box {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}
button {
  margin: 4px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #e2e8f0;
  cursor: pointer;
}
input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  width: 62%;
  box-sizing: border-box;
}
.active { background: #3b82f6; color: white; }
.success { background: #22c55e; color: white; }
.fail { background: #ef4444; color: white; }
.record, .stat {
  background: #f8fafc;
  padding: 8px;
  margin-top: 6px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
}
.sub-title {
  margin-top: 8px;
  font-weight: bold;
}
#tacticBox { display: none; }
</style>
</head>

<body>

<h2>🏀 进攻训练记录</h2>

<div class="box">
<b>添加队员：</b><br>
<input id="playerInput" placeholder="输入队员姓名或号码">
<button onclick="addPlayer()">添加队员</button>
<div id="playerList"></div>
</div>

<div class="box">
<b>节次：</b><br>
<button onclick="setQuarter(this,'第一节')">第一节</button>
<button onclick="setQuarter(this,'第二节')">第二节</button>
<button onclick="setQuarter(this,'第三节')">第三节</button>
<button onclick="setQuarter(this,'第四节')">第四节</button>
</div>

<div class="box">
<b>阶段：</b><br>
<button onclick="setPhase(this,'快攻')">快攻</button>
<button onclick="setPhase(this,'急攻')">急攻</button>
<button onclick="setPhase(this,'衔接')">衔接</button>
<button onclick="setPhase(this,'阵地进攻')">阵地进攻</button>
</div>

<div class="box" id="tacticBox">
<b>阵地进攻战术：</b><br>
<button onclick="setTactic(this,'打2')">打2</button>
<button onclick="setTactic(this,'打5')">打5</button>
<button onclick="setTactic(this,'拇指')">拇指</button>
<button onclick="setTactic(this,'拉链')">拉链</button>
<button onclick="setTactic(this,'牛角')">牛角</button>
<button onclick="setTactic(this,'1提')">1提</button>
<button onclick="setTactic(this,'拍头')">拍头</button>
<button onclick="setTactic(this,'联2')">联2</button>
<button onclick="setTactic(this,'联3')">联3</button><br>
<input id="tacticInput" placeholder="也可以手动输入战术">
<button onclick="setCustomTactic()">录入战术</button>
</div>

<div class="box">
<b>球员选择：</b><br>
<div class="sub-title">助攻人：</div>
<div id="assistList">请先添加队员</div>
<div class="sub-title">终结人：</div>
<div id="finisherList">请先添加队员</div>
</div>

<div class="box">
<b>终结方式：</b><br>
<button onclick="setFinish(this,'上篮')">上篮</button>
<button onclick="setFinish(this,'直接3分')">直接3分</button>
<button onclick="setFinish(this,'跳投')">跳投</button>
<button onclick="setFinish(this,'挡拆终结')">挡拆终结</button>
</div>

<div class="box">
<b>终结区域：</b><br>
<button onclick="setArea(this,'左45°')">左45°</button>
<button onclick="setArea(this,'右45°')">右45°</button>
<button onclick="setArea(this,'左0°')">左0°</button>
<button onclick="setArea(this,'右0°')">右0°</button>
<button onclick="setArea(this,'中间')">中间</button>
</div>

<div class="box">
<b>结果：</b><br>
<button class="success" onclick="setResult(this,'成功')">成功</button>
<button class="fail" onclick="setResult(this,'失败')">失败</button>
</div>

<div class="box">
<button onclick="addRecord()">🚀 记录</button>
<button onclick="resetAll()">清空选择</button>
<button onclick="clearSavedData()">清空全部数据</button>
<button onclick="exportCSV()">导出CSV</button>
</div>

<div class="box">
<b>统计归纳：</b>
<div id="stats"></div>
</div>

<div class="box">
<b>记录：</b>
<div id="list"></div>
</div>

<script>
let quarter = "";
let phase = "";
let tactic = "";
let assistPlayer = "";
let finisherPlayer = "";
let finish = "";
let area = "";
let result = "";

const defaultPlayers = [
  "李殊洋",
  "孙恬馨",
  "于欣慧",
  "尹俐骄",
  "符钰皙",
  "周灿一",
  "葛滢",
  "金紫萱",
  "张楚涵",
  "韩宇彤",
  "吴若玙",
  "段万菲",
  "小白"
];

let savedPlayers = localStorage.getItem("players");
let players = savedPlayers ? JSON.parse(savedPlayers) : defaultPlayers.slice();
let records = JSON.parse(localStorage.getItem("records") || "[]");

defaultPlayers.forEach(name=>{
  if(!players.includes(name)){
    players.push(name);
  }
});

function saveData(){
  localStorage.setItem("players", JSON.stringify(players));
  localStorage.setItem("records", JSON.stringify(records));
}

function clearActive(group){
  group.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
}

function getRecordText(r){
  if(typeof r === "string") return r;
  let tacticText = r.tactic ? " | 战术：" + r.tactic : "";
  return r.time + " | " + r.quarter + " | " + r.phase + tacticText +
    " | 助攻人：" + (r.assistPlayer || "未选") +
    " | 终结人：" + (r.finisherPlayer || "未选") +
    " | 终结方式：" + (r.finish || "未选") +
    " | 终结区域：" + (r.area || "未选") +
    " | " + r.result;
}

function renderRecords(){
  let html = "";
  records.slice(0,80).forEach(r=>{
    html += "<div class='record'>" + getRecordText(r) + "</div>";
  });
  document.getElementById("list").innerHTML = html || "暂无记录";
  renderStats();
}

function addPlayer(){
  let input = document.getElementById("playerInput");
  let name = input.value.trim();

  if(!name){
    alert("请输入队员名称");
    return;
  }

  if(players.includes(name)){
    alert("这个队员已经添加过了");
    return;
  }

  players.push(name);
  input.value = "";
  saveData();
  renderPlayers();
}

function renderPlayers(){
  let playerList = document.getElementById("playerList");
  let assistList = document.getElementById("assistList");
  let finisherList = document.getElementById("finisherList");

  playerList.innerHTML = "";
  assistList.innerHTML = "";
  finisherList.innerHTML = "";

  players.forEach(name=>{
    playerList.innerHTML += "<button>" + name + "</button>";
    assistList.innerHTML += "<button onclick=\"setAssistPlayer(this,'" + name + "')\">" + name + "</button>";
    finisherList.innerHTML += "<button onclick=\"setFinisherPlayer(this,'" + name + "')\">" + name + "</button>";
  });

  if(players.length === 0){
    assistList.innerHTML = "请先添加队员";
    finisherList.innerHTML = "请先添加队员";
  }
}

function setQuarter(btn,val){
  clearActive(btn.parentNode);
  btn.classList.add("active");
  quarter = val;
}

function setPhase(btn,val){
  clearActive(btn.parentNode);
  btn.classList.add("active");
  phase = val;

  let tacticBox = document.getElementById("tacticBox");
  if(val === "阵地进攻"){
    tacticBox.style.display = "block";
  }else{
    tactic = "";
    document.getElementById("tacticInput").value = "";
    tacticBox.style.display = "none";
    clearActive(tacticBox);
  }
}

function setTactic(btn,val){
  clearActive(document.getElementById("tacticBox"));
  btn.classList.add("active");
  tactic = val;
  document.getElementById("tacticInput").value = val;
}

function setCustomTactic(){
  let input = document.getElementById("tacticInput");
  let val = input.value.trim();
  if(!val){
    alert("请输入战术名称");
    return;
  }
  clearActive(document.getElementById("tacticBox"));
  tactic = val;
}

function setAssistPlayer(btn,val){
  clearActive(btn.parentNode);
  btn.classList.add("active");
  assistPlayer = val;
}

function setFinisherPlayer(btn,val){
  clearActive(btn.parentNode);
  btn.classList.add("active");
  finisherPlayer = val;
}

function setFinish(btn,val){
  clearActive(btn.parentNode);
  btn.classList.add("active");
  finish = val;
}

function setArea(btn,val){
  clearActive(btn.parentNode);
  btn.classList.add("active");
  area = val;
}

function setResult(btn,val){
  clearActive(btn.parentNode);
  btn.classList.add("active");
  result = val;
}

function getPoints(record){
  if(record.result !== "成功") return 0;
  return record.finish === "直接3分" ? 3 : 2;
}

function addRecord(){
  if(!quarter || !phase || !result){
    alert("请选择节次、阶段和结果");
    return;
  }

  if(phase === "阵地进攻" && !tactic){
    alert("请选择或手动输入阵地进攻战术");
    return;
  }

  let record = {
    time: new Date().toLocaleTimeString(),
    quarter,
    phase,
    tactic,
    assistPlayer,
    finisherPlayer,
    finish,
    area,
    result
  };

  records.unshift(record);
  saveData();
  renderRecords();
  resetAll();
}

function emptyStageStat(){
  return { total: 0, success: 0, fail: 0, points: 0 };
}

function renderStats(){
  let usableRecords = records.filter(r=>typeof r !== "string");
  if(usableRecords.length === 0){
    document.getElementById("stats").innerHTML = "暂无可统计数据";
    return;
  }

  let quarters = ["第一节", "第二节", "第三节", "第四节"];
  let phases = ["快攻", "急攻", "衔接", "阵地进攻"];
  let html = "";

  quarters.forEach(q=>{
    let qRecords = usableRecords.filter(r=>r.quarter === q);
    let points = qRecords.reduce((sum,r)=>sum + getPoints(r), 0);
    html += "<div class='stat'><b>" + q + "</b>：记录 " + qRecords.length + " 次，总得分 " + points + " 分</div>";
  });

  html += "<div class='stat'><b>四阶段统计</b><br>";
  phases.forEach(p=>{
    let stat = emptyStageStat();
    usableRecords.filter(r=>r.phase === p).forEach(r=>{
      stat.total += 1;
      stat.points += getPoints(r);
      if(r.result === "成功") stat.success += 1;
      if(r.result === "失败") stat.fail += 1;
    });
    let ratio = stat.fail === 0 ? stat.success + ":0" : stat.success + ":" + stat.fail;
    html += p + "：总得分 " + stat.points + " 分，成功/失败 " + ratio + "，成功率 " + rate(stat.success, stat.total) + "<br>";
  });
  html += "</div>";

  let tacticMap = {};
  usableRecords.filter(r=>r.tactic).forEach(r=>{
    if(!tacticMap[r.tactic]) tacticMap[r.tactic] = { total: 0, success: 0 };
    tacticMap[r.tactic].total += 1;
    if(r.result === "成功") tacticMap[r.tactic].success += 1;
  });

  html += "<div class='stat'><b>不同战术成功率</b><br>";
  let tacticNames = Object.keys(tacticMap);
  if(tacticNames.length === 0){
    html += "暂无战术数据";
  }else{
    tacticNames.forEach(name=>{
      let item = tacticMap[name];
      html += name + "：" + item.success + "/" + item.total + "，成功率 " + rate(item.success, item.total) + "<br>";
    });
  }
  html += "</div>";

  document.getElementById("stats").innerHTML = html;
}

function rate(success,total){
  if(total === 0) return "0%";
  return Math.round(success / total * 100) + "%";
}

function resetAll(){
  quarter = "";
  phase = "";
  tactic = "";
  assistPlayer = "";
  finisherPlayer = "";
  finish = "";
  area = "";
  result = "";
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tacticBox").style.display = "none";
  document.getElementById("tacticInput").value = "";
}

function clearSavedData(){
  if(confirm("确定要清空所有队员和记录吗？")){
    players = defaultPlayers.slice();
    records = [];
    saveData();
    renderPlayers();
    renderRecords();
    resetAll();
  }
}

function exportCSV(){
  if(records.length === 0){
    alert("暂无记录可导出");
    return;
  }
  let rows = [["时间","节次","阶段","战术","助攻人","终结人","终结方式","终结区域","结果"]];
  records.forEach(r=>{
    if(typeof r === "string"){
      rows.push([r,"","","","","","","",""]);
    }else{
      rows.push([r.time,r.quarter,r.phase,r.tactic,r.assistPlayer,r.finisherPlayer,r.finish,r.area,r.result]);
    }
  });
  let csv = rows.map(row=>row.map(cell=>'"' + String(cell || "").replaceAll('"','""') + '"').join(",")).join("\n");
  let blob = new Blob(["\ufeff" + csv], {type: "text/csv;charset=utf-8;"});
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url;
  a.download = "训练记录.csv";
  a.click();
  URL.revokeObjectURL(url);
}

window.onload = function(){
  saveData();
  renderPlayers();
  renderRecords();
};
</script>

</body>
</html>
